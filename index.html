<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRUCIBATTLE!</title>
    <!-- Tailwind CSS per lo styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel per compilare il JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            25% { transform: rotate(-5deg) translateX(-5px); }
            75% { transform: rotate(5deg) translateX(5px); }
        }
        .animate-shake { animation: shake 0.15s ease-in-out infinite; }
        
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .zoom-in { animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        body { 
            overscroll-behavior: none; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f0f4ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        
        // Helper per le icone Lucide
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && lucide[name]) {
                    lucide.createIcons({
                        targets: [iconRef.current],
                        icons: { [name]: lucide[name] }
                    });
                }
            }, [name]);
            return <i data-lucide={name} ref={iconRef} className={className} style={{ width: size, height: size, fill: fill }}></i>;
        };

        const GRID_SIZE = 8; // Matrice 8x8
        const WORDS_PER_REWARD = 5;

        // Parole di fallback se il file esterno non è disponibile
        const FALLBACK_WORDS = [
            "MAMMA", "PAPA", "NONNO", "NONNA", "CANE", "GATTO", "SOLE", "MARE", 
            "CASA", "PALLA", "LIBRO", "FIORE", "PANE", "LATTE", "MELA", "NIDO",
            "RANA", "LUNA", "LUCE", "ORSO", "UVA", "VINO", "ERBA", "TRENO",
            "BISCUTTO", "FRUTTA", "SCUOLA", "GIOCO"
        ];

        const App = () => {
            const [words, setWords] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentWord, setCurrentWord] = useState('');
            const [grid, setGrid] = useState([]);
            const [isUppercase, setIsUppercase] = useState(true);
            const [found, setFound] = useState(false);
            const [gameStarted, setGameStarted] = useState(false);
            const [correctCoords, setCorrectCoords] = useState([]);
            const [feedbackMap, setFeedbackMap] = useState({}); 
            const [foundCount, setFoundCount] = useState(0);
            const [totalSolved, setTotalSolved] = useState(0);
            const [showReward, setShowReward] = useState(false);
            const [chestState, setChestState] = useState('closed');

            const speechIntervalRef = useRef(null);
            const audioCtxRef = useRef(null);

            // Caricamento parole
            useEffect(() => {
                const loadWords = async () => {
                    try {
                        const response = await fetch('assets/words.txt');
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const text = await response.text();
                        const list = text.split(/\r?\n/)
                            .map(w => w.trim().toUpperCase())
                            .filter(w => w.length >= 3 && w.length <= GRID_SIZE);
                        
                        if (list.length === 0) throw new Error("File vuoto");
                        setWords(list);
                    } catch (err) {
                        console.warn("Utilizzo fallback: " + err.message);
                        setWords(FALLBACK_WORDS);
                    } finally {
                        setLoading(false);
                    }
                };
                loadWords();
            }, []);

            const playTone = (freq, type = 'sine', duration = 0.1, volume = 0.5) => {
                try {
                    if (!audioCtxRef.current) {
                        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    const ctx = audioCtxRef.current;
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(volume, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {}
            };

            const playRewardSound = () => {
                const tones = [523.25, 659.25, 783.99, 1046.50];
                tones.forEach((t, i) => {
                    setTimeout(() => playTone(t, 'square', 0.4, 0.05), i * 150);
                });
            };

            const initGame = useCallback((forceNextCase = null) => {
                if (words.length === 0) return;

                const nextCase = forceNextCase !== null ? forceNextCase : !isUppercase;
                setIsUppercase(nextCase);
                
                const word = words[Math.floor(Math.random() * words.length)];
                const displayWord = nextCase ? word.toUpperCase() : word.toLowerCase();
                
                setCurrentWord(displayWord);
                setFound(false);
                setFoundCount(0);
                setFeedbackMap({});
                
                let newGrid = Array(GRID_SIZE).fill(null).map(() => 
                    Array(GRID_SIZE).fill(null).map(() => {
                        const charCode = Math.floor(Math.random() * 26) + (nextCase ? 65 : 97);
                        return String.fromCharCode(charCode);
                    })
                );

                const row = Math.floor(Math.random() * GRID_SIZE);
                const startCol = Math.floor(Math.random() * (GRID_SIZE - word.length + 1));
                const coords = [];
                for (let i = 0; i < word.length; i++) {
                    newGrid[row][startCol + i] = displayWord[i];
                    coords.push(`${row}-${startCol + i}`);
                }
                setGrid(newGrid);
                setCorrectCoords(coords);
            }, [isUppercase, words]);

            const speakWord = useCallback(() => {
                if (!currentWord || found || !gameStarted || showReward) return;
                const utterance = new SpeechSynthesisUtterance(currentWord.toLowerCase());
                utterance.lang = 'it-IT';
                utterance.rate = 0.7; 
                window.speechSynthesis.speak(utterance);
            }, [currentWord, found, gameStarted, showReward]);

            useEffect(() => {
                if (gameStarted && !found && !showReward) {
                    speakWord();
                    speechIntervalRef.current = setInterval(speakWord, 4000);
                } else {
                    clearInterval(speechIntervalRef.current);
                }
                return () => clearInterval(speechIntervalRef.current);
            }, [gameStarted, found, speakWord, showReward]);

            const handleCellClick = (r, c) => {
                if (found || showReward) return;
                const id = `${r}-${c}`;
                if (correctCoords.includes(id)) {
                    if (feedbackMap[id] !== 'correct') {
                        playTone(660, 'sine', 0.15);
                        const newFeedback = { ...feedbackMap, [id]: 'correct' };
                        setFeedbackMap(newFeedback);
                        const newCount = foundCount + 1;
                        setFoundCount(newCount);
                        if (newCount === correctCoords.length) {
                            setFound(true);
                            const nextTotal = totalSolved + 1;
                            setTotalSolved(nextTotal);
                            
                            // Effetti sonori procedurali
                            setTimeout(() => playTone(523, 'sine', 0.2), 100);
                            setTimeout(() => playTone(783, 'sine', 0.4), 300);

                            // Gestione audio vittoria con fallback
                            const victoryAudio = new Audio('audio/victory.mp3');
                            victoryAudio.play().catch(() => {
                                // Fallback alla sintesi vocale se il file mp3 fallisce
                                const winSound = new SpeechSynthesisUtterance("Urrà!");
                                winSound.lang = 'it-IT';
                                winSound.pitch = 1.3;
                                window.speechSynthesis.speak(winSound);
                            });

                            setTimeout(() => {
                                if (nextTotal % WORDS_PER_REWARD === 0) {
                                    setShowReward(true);
                                    setChestState('closed');
                                } else {
                                    initGame();
                                }
                            }, 3000);
                        }
                    }
                } else {
                    playTone(150, 'triangle', 0.3);
                    setFeedbackMap(prev => ({ ...prev, [id]: 'wrong' }));
                    setTimeout(() => {
                        setFeedbackMap(prev => {
                            const next = { ...prev };
                            if (next[id] === 'wrong') delete next[id];
                            return next;
                        });
                    }, 600);
                }
            };

            const handleOpenChest = () => {
                if (chestState === 'closed') {
                    setChestState('shaking');
                    playTone(200, 'square', 0.5);
                    setTimeout(() => {
                        setChestState('open');
                        playRewardSound();
                    }, 1000);
                } else if (chestState === 'open') {
                    setShowReward(false);
                    setChestState('closed');
                    initGame();
                }
            };

            if (loading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-900 text-white">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-yellow-400 mb-4"></div>
                        <p className="text-xl font-bold uppercase tracking-widest">Caricamento...</p>
                    </div>
                );
            }

            if (!gameStarted) {
                return (
                    <div 
                        className="flex flex-col items-center justify-center min-h-screen bg-indigo-900 p-6 text-center"
                        style={{ 
                            backgroundImage: "url('assets/start_background.jpg')",
                            backgroundSize: 'cover',
                            backgroundPosition: 'center',
                            backgroundRepeat: 'no-repeat'
                        }}
                    >
                        <div className="bg-white/95 backdrop-blur-sm p-8 rounded-3xl shadow-2xl max-w-sm border-b-8 border-indigo-200">
                            <div className="flex justify-center mb-4 text-yellow-400">
                                <Icon name="Star" size={48} fill="currentColor" />
                            </div>
                            <h1 className="text-4xl font-black text-indigo-900 mb-2 tracking-tight uppercase">CRUCIBATTLE!</h1>
                            <p className="text-lg text-indigo-600 mb-8 font-medium italic">Il gioco delle super parole</p>
                            <button onClick={() => { setGameStarted(true); initGame(true); }} className="w-full bg-yellow-400 text-indigo-900 px-8 py-5 rounded-2xl text-3xl font-black shadow-[0_6px_0_rgb(202,138,4)] active:translate-y-1 active:shadow-none transition-all tracking-tighter uppercase">Gioca!</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center min-h-screen bg-indigo-50 p-2 font-sans select-none touch-none overflow-hidden">
                    {showReward && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-indigo-900/95 p-6 animate-in">
                            <div className="text-yellow-400 text-4xl font-black mb-12 tracking-widest animate-bounce uppercase">PREMIO SPECIALE!</div>
                            <div onClick={handleOpenChest} className={`relative cursor-pointer transition-transform ${chestState === 'shaking' ? 'animate-shake' : 'hover:scale-105 active:scale-95'}`}>
                                {chestState !== 'open' ? (
                                    <div className="relative">
                                        <div className="absolute -inset-8 bg-yellow-400/20 rounded-full blur-3xl animate-pulse"></div>
                                        <div className="bg-orange-600 w-48 h-40 rounded-xl border-t-8 border-orange-400 border-x-4 shadow-2xl flex items-center justify-center relative overflow-hidden">
                                            <div className="absolute top-1/2 w-full h-4 bg-orange-800"></div>
                                            <div className="w-12 h-12 bg-yellow-400 rounded-lg border-4 border-orange-800 z-10"></div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center zoom-in">
                                        <div className="relative flex gap-4 text-yellow-400">
                                            <Icon name="Star" size={80} fill="currentColor" className="animate-bounce" />
                                            <Icon name="Star" size={100} fill="currentColor" className="animate-bounce [animation-delay:0.1s]" />
                                            <Icon name="Star" size={80} fill="currentColor" className="animate-bounce [animation-delay:0.2s]" />
                                        </div>
                                        <div className="text-white text-3xl font-black mt-12 bg-white/10 px-8 py-4 rounded-full uppercase">Avanti!</div>
                                    </div>
                                )}
                            </div>
                            {chestState === 'closed' && <div className="text-white/60 mt-12 font-bold text-xl animate-pulse uppercase tracking-widest">Tocca il forziere!</div>}
                        </div>
                    )}

                    {/* Progress Bar */}
                    <div className="w-full max-w-md flex items-center justify-between mb-2 px-2">
                        <div className="flex items-center gap-1 bg-white px-3 py-1 rounded-xl shadow-sm border-b-2 border-indigo-100">
                            <Icon name="Star" size={18} className="text-yellow-500" fill="currentColor" />
                            <span className="font-black text-indigo-900 text-lg">{totalSolved}</span>
                        </div>
                        <div className="flex-1 mx-3 bg-indigo-200 h-5 rounded-full overflow-hidden border-2 border-white shadow-inner relative">
                            <div className="bg-yellow-400 h-full transition-all duration-1000 ease-out" style={{ width: `${(totalSolved % WORDS_PER_REWARD) * (100/WORDS_PER_REWARD)}%` }} />
                        </div>
                        <div className="bg-white p-1 rounded-xl shadow-sm border-b-2 border-indigo-100 text-indigo-300">
                            <Icon name="Gift" size={20} className={totalSolved % WORDS_PER_REWARD === 0 && totalSolved !== 0 ? "text-green-500 animate-bounce" : ""} />
                        </div>
                    </div>

                    {/* Word Display */}
                    <div className="w-full max-w-md bg-white rounded-2xl shadow-md p-4 mb-4 text-center border-b-4 border-indigo-200">
                        <div className="text-indigo-300 uppercase text-[10px] font-black tracking-widest mb-1">Cerca questa parola:</div>
                        <div className={`text-5xl font-black tracking-tighter ${found ? 'text-green-500 scale-110' : 'text-indigo-900'} transition-all`}>{currentWord}</div>
                    </div>

                    {/* 8x8 Grid */}
                    <div 
                        className="grid gap-1.5 p-2 bg-white rounded-2xl shadow-xl border-4 border-white" 
                        style={{ 
                            gridTemplateColumns: `repeat(${GRID_SIZE}, 1fr)`, 
                            width: '100%', 
                            maxWidth: '450px', 
                            aspectRatio: '1/1' 
                        }}
                    >
                        {grid.map((row, r) => row.map((char, c) => {
                            const id = `${r}-${c}`;
                            const status = feedbackMap[id];
                            let cellClass = "bg-indigo-50 text-indigo-800 border-indigo-100";
                            if (status === 'correct') cellClass = "bg-green-500 text-white shadow-inner scale-95 border-green-600";
                            if (status === 'wrong') cellClass = "bg-red-500 text-white animate-shake border-red-600";
                            return (
                                <button 
                                    key={id} 
                                    onClick={() => handleCellClick(r, c)} 
                                    className={`flex items-center justify-center text-2xl sm:text-3xl font-black rounded-lg transition-all duration-200 aspect-square border-b-2 ${cellClass} ${!status ? 'active:bg-indigo-200' : ''}`}
                                >
                                    {char}
                                </button>
                            );
                        }))}
                    </div>

                    {/* Victory Message or Audio Button */}
                    <div className="mt-4 h-12 flex items-center justify-center">
                        {found ? (
                            <div className="flex items-center gap-2 text-green-600 font-black text-2xl animate-bounce">
                                <Icon name="CheckCircle2" size={32} className="stroke-[3]" /> BRAVO!
                            </div>
                        ) : (
                            <button onClick={speakWord} className="flex items-center gap-2 bg-white px-5 py-2 rounded-full shadow-md text-indigo-600 font-bold active:scale-95 text-sm uppercase tracking-wide">
                                <Icon name="Volume2" size={20} /> Ascolta
                            </button>
                        )}
                    </div>

                    <div className="mt-auto text-[9px] text-indigo-300 font-black uppercase tracking-widest opacity-40 pb-2">CRUCIBATTLE! v1.1 • 8x8 Grid</div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
